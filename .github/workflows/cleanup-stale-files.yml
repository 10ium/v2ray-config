name: Manually Cleanup Stale Split Files
on:
  workflow_dispatch:
    inputs:
      target_directory:
        description: 'Path to the directory containing split files (e.g., SortedConfigs/Splitted-By-Protocol)'
        required: true
        default: 'Base64' # مسیر پیش‌فرض فایل‌های تقسیم‌شده شما
      stale_days:
        description: 'Number of days after which a file is considered stale and will be deleted'
        required: true
        default: '7' # فایل‌ها پس از ۷ روز عدم به‌روزرسانی حذف می‌شوند

jobs:
  cleanup_files:
    runs-on: ubuntu-latest
    permissions:
      contents: write # اجازه برای کامیت و پوش کردن تغییرات

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

      - name: Find and delete stale files
        env:
          TARGET_DIR: ${{ github.event.inputs.target_directory }}
          STALE_DAYS: ${{ github.event.inputs.stale_days }}
        run: |
          if [ ! -d "$TARGET_DIR" ]; then
            echo "Error: Target directory '$TARGET_DIR' does not exist."
            exit 1
          fi

          echo "Scanning directory: $TARGET_DIR for files not updated in the last $STALE_DAYS days..."
          
          CURRENT_TIMESTAMP=$(date +%s)
          STALE_SECONDS=$((STALE_DAYS * 24 * 60 * 60))
          FILES_DELETED_COUNT=0

          # Iterate over .txt files in the target directory
          # Using find to handle filenames robustly
          find "$TARGET_DIR" -maxdepth 1 -type f -name "*.txt" -print0 | while IFS= read -r -d $'\0' file_path; do
            echo "Checking file: $file_path"
            
            # Get the Unix timestamp of the last commit affecting this file
            # If the file was never committed or git log fails, it will be empty
            LAST_COMMIT_TIMESTAMP_FOR_FILE=$(git log -1 --format=%ct -- "$file_path")

            if [ -z "$LAST_COMMIT_TIMESTAMP_FOR_FILE" ]; then
              echo "Warning: Could not get commit timestamp for $file_path. It might be a new or untracked file. Skipping."
              continue
            fi
            
            echo "Last commit timestamp for $file_path: $LAST_COMMIT_TIMESTAMP_FOR_FILE"
            FILE_AGE_SECONDS=$((CURRENT_TIMESTAMP - LAST_COMMIT_TIMESTAMP_FOR_FILE))

            if [ "$FILE_AGE_SECONDS" -gt "$STALE_SECONDS" ]; then
              echo "File $file_path is stale (last updated $((FILE_AGE_SECONDS / 86400)) days ago). Deleting..."
              git rm "$file_path"
              FILES_DELETED_COUNT=$((FILES_DELETED_COUNT + 1))
            else
              echo "File $file_path is not stale (last updated $((FILE_AGE_SECONDS / 86400)) days ago)."
            fi
          done

          if [ "$FILES_DELETED_COUNT" -gt 0 ]; then
            echo "$FILES_DELETED_COUNT stale file(s) deleted. Committing and pushing changes..."
            git commit -m "Clean up: Remove $FILES_DELETED_COUNT stale file(s) from $TARGET_DIR (older than $STALE_DAYS days)"
            git push
          else
            echo "No stale files found to delete in $TARGET_DIR."
          fi
        shell: bash
